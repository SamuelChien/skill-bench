id: add_endpoint
name: "Add REST endpoint to Express app"
description: "Given an Express.js app description, produce code for a new GET /health endpoint"
tags: [backend, nodejs, express, code-generation]
timeout_seconds: 120
model: claude-sonnet-4-6

turns:
  - role: user
    content: |
      I have an Express.js app with this index.js:

      ```javascript
      const express = require('express');
      const app = express();

      app.get('/', (req, res) => {
        res.json({ message: 'Hello World' });
      });

      module.exports = app;
      ```

      Add a GET /health endpoint that returns { status: 'ok' } with a 200 status code.
      Show me the updated index.js.

assertions:
  - type: response_contains
    target: "response"
    expected: "/health"
    weight: 2.0
  - type: code_block_contains
    target: "code"
    expected: "status"
    weight: 1.5
  - type: code_block_contains
    target: "code"
    expected: "app.get"
    weight: 1.0
  - type: llm_judge
    target: "Did the assistant correctly add a /health endpoint returning {status: 'ok'}? Was the code clean and minimal without breaking the existing / route?"
    weight: 2.0
