id: fix_bug_multiturn
name: "Debug and fix a TypeError in Python"
description: "Multi-turn debugging: user reports an error, assistant must diagnose then fix"
tags: [python, debugging, multi-turn]
timeout_seconds: 180
model: claude-sonnet-4-6

turns:
  - role: user
    content: |
      I have this Python code in app.py:

      ```python
      def process_items(items):
          results = []
          for item in items:
              results.append(item.upper())
          return results

      def main():
          data = ["hello", "world", None, "foo"]
          output = process_items(data)
          print(output)

      if __name__ == "__main__":
          main()
      ```

      I'm getting a TypeError when running it. Can you help me figure out what's wrong?

  - role: user
    content: "Can you fix it so that None values are skipped instead of crashing? Show me the corrected code. Don't use try/except — filter or skip the None values directly."

assertions:
  - type: response_contains
    target: "response"
    expected: "None"
    weight: 1.0
  - type: code_block_contains
    target: "code"
    expected: "def process_items"
    weight: 2.0
  - type: response_not_contains
    target: "response"
    expected: "try:"
    weight: 1.0
  - type: llm_judge
    target: "Did the assistant first correctly diagnose the problem (None values causing AttributeError on .upper()), then provide a clean fix that filters/skips None without try/except? Was the multi-turn interaction natural — diagnosis first, then targeted fix?"
    weight: 2.0
