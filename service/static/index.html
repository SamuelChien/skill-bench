<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>skill-bench</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="shell">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-brand"><em>skill</em>-bench</div>
    <div class="topbar-right">
      <span><span class="dot" id="dot"></span><span id="mode">connecting</span></span>
    </div>
  </div>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-section">Benchmark</div>
    <button class="sidebar-item active" onclick="nav('jobs')">
      <span class="icon">&#9654;</span> Jobs <span class="count" id="cnt-jobs">0</span>
    </button>
    <button class="sidebar-item" onclick="nav('tests')">
      <span class="icon">&#9776;</span> Test Cases <span class="count" id="cnt-tests">0</span>
    </button>
    <button class="sidebar-item" onclick="nav('actors')">
      <span class="icon">&#9733;</span> Actors <span class="count" id="cnt-actors">0</span>
    </button>

    <div class="sidebar-section">Optimize</div>
    <button class="sidebar-item" onclick="nav('hillclimb')">
      <span class="icon">&#9650;</span> Hill Climb
    </button>

    <div class="sidebar-spacer"></div>
    <div class="sidebar-footer">
      <button class="btn btn-primary" style="width:100%" onclick="nav('new-job')">New Job</button>
    </div>
  </nav>

  <!-- Main -->
  <div class="main" id="main"></div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
